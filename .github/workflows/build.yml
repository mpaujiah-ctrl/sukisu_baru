name: Build TURTLE (ReSukiSU)

on:
  workflow_dispatch:
  push:
    branches:
      - resukisu-integration
  pull_request:
    branches:
      - resukisu-integration

env:
  KERNEL_NAME: TURTLE
  DEVICE_CODENAME: cepheus
  DEFCONFIG: cepheus_defconfig
  ARCH: arm64
  # Swap for whatever clang TURTLE's existing KSUN build.yml pins —
  # keeping the same toolchain removes one variable while debugging
  # a brand new root-manager integration.
  CLANG_VERSION: "r547379"
  SUSFS_BRANCH: "gki-android15-6.6" # placeholder — see SUSFS step below
  KSU_VERSION_FALLBACK: 33129

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            git libssl-dev libncurses-dev python3 python3-pip \
            zip unzip rsync

      - name: Enable ccache
        run: |
          echo "USE_CCACHE=1" >> "$GITHUB_ENV"
          echo "CCACHE_DIR=$HOME/.ccache" >> "$GITHUB_ENV"
          ccache -M 5G

      - name: Cache ccache directory
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ env.DEVICE_CODENAME }}-resukisu-${{ github.sha }}
          restore-keys: |
            ccache-${{ env.DEVICE_CODENAME }}-resukisu-

      - name: Fetch prebuilt Clang toolchain
        run: |
          mkdir -p toolchain/clang
          # TODO: point this at the exact same mirror/tag your KSUN
          # build.yml already uses instead of this placeholder URL.
          curl -LSs "https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-${CLANG_VERSION}-lastbuild.zip" -o clang.zip
          unzip -q clang.zip -d toolchain/clang
          echo "$GITHUB_WORKSPACE/toolchain/clang/bin" >> "$GITHUB_PATH"

      - name: Integrate ReSukiSU (setup.sh)
        run: |
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
          echo "[+] ReSukiSU symlinked into drivers/kernelsu"

      - name: Apply manual-hook compatibility patch
        run: |
          # Fixes ksu_handle_stat signature (2-arg -> 3-arg) for ReSukiSU compat.
          # Safe to re-run: checks before applying so it no-ops once merged
          # upstream into this branch.
          git apply --check resukisu-cepheus-manual-hooks.patch 2>/dev/null \
            && git apply resukisu-cepheus-manual-hooks.patch \
            && echo "[+] Patch applied" \
            || echo "[i] Patch already applied or not needed, skipping"

      - name: Apply known InfiniR build fixes
        run: |
          # Carried over from the KSUN-era TURTLE build; these address
          # InfiniR source quirks, not root-manager specifics, so they
          # should still apply with ReSukiSU. Re-verify #2 below though —
          # CONFIG_KSU_SUSFS_TRY_UMOUNT was a KSUN-specific umount bug
          # workaround and may not have a ReSukiSU equivalent flag.

          # 1. KSU_VERSION_FALLBACK — InfiniR's build system can't always
          #    derive a version string from a shallow/detached clone.
          if ! grep -q "KSU_VERSION_FALLBACK" Makefile; then
            echo "KSU_VERSION_FALLBACK := ${KSU_VERSION_FALLBACK}" >> Makefile
          fi

          # 2. yamltree.c stub — verify this is still needed for ReSukiSU;
          #    it was required to satisfy a missing symbol during the
          #    original KSUN + SUSFS v2.1.0 bring-up.
          if [ ! -f scripts/yamltree.c ] && [ -f scripts/yamltree.c.stub ]; then
            cp scripts/yamltree.c.stub scripts/yamltree.c
            echo "[+] yamltree.c stub applied"
          fi

      - name: Integrate SUSFS
        run: |
          # ReSukiSU documents SUSFS as a separate backport step: pick the
          # branch matching this kernel version from simonpunk/susfs4ksu
          # and apply the kernel-side patches, same pattern as pulling
          # SUSFS from raystef66's 16.0-ksun branch previously — just
          # confirm the branch name below is the non-GKI/4.14-compatible
          # one before relying on this in CI, the "gki-*" branches target
          # GKI2 kernels and won't apply cleanly to 4.14.
          git clone --depth 1 -b "${SUSFS_BRANCH}" https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu || {
            echo "::warning::SUSFS branch ${SUSFS_BRANCH} not found — verify the correct non-GKI branch name and update SUSFS_BRANCH"
            exit 1
          }
          cp susfs4ksu/kernel_patches/fs/* fs/ 2>/dev/null || true
          cp susfs4ksu/kernel_patches/include/linux/* include/linux/ 2>/dev/null || true
          echo "CONFIG_KSU_SUSFS=y" >> "arch/${ARCH}/configs/${DEFCONFIG}"

      - name: Validate required manual hooks are present
        run: |
          python3 .github/scripts/verify_ksu_hooks.py \
            --dfd fs/stat.c \
            --execveat fs/exec.c \
            --faccessat fs/open.c \
            --reboot kernel/reboot.c
          # Adapt this from the SukiSU-Ultra CI script that already does
          # sys.exit(1)-on-mismatch — same pattern, just re-pointed at the
          # ReSukiSU hook signatures confirmed during recon.

      - name: Confirm defconfig flags
        run: |
          for flag in CONFIG_KSU=y CONFIG_KSU_MANUAL_HOOK=y CONFIG_KALLSYMS_ALL=y CONFIG_KSU_SUSFS=y; do
            grep -qx "$flag" "arch/${ARCH}/configs/${DEFCONFIG}" || {
              echo "::error::Missing $flag in ${DEFCONFIG}"; exit 1;
            }
          done
          grep -q "^CONFIG_KPROBES=y" "arch/${ARCH}/configs/${DEFCONFIG}" && {
            echo "::error::CONFIG_KPROBES must stay disabled on 4.14 non-GKI (this is what broke the SukiSU-Ultra builtin branch)"; exit 1;
          } || echo "[+] CONFIG_KPROBES correctly unset"

      - name: Build kernel
        run: |
          export ARCH=${ARCH}
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          make O=out ${DEFCONFIG}
          make O=out -j$(nproc --all) CC="clang" 2>&1 | tee build.log
          test -f out/arch/${ARCH}/boot/Image || {
            echo "::error::Kernel Image not produced, see build.log"; exit 1;
          }

      - name: Package AnyKernel3
        run: |
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3 AK3
          cp out/arch/${ARCH}/boot/Image AK3/
          [ -f out/arch/${ARCH}/boot/dtbo.img ] && cp out/arch/${ARCH}/boot/dtbo.img AK3/
          cd AK3
          zip -r9 "../${KERNEL_NAME}-ReSukiSU-${DEVICE_CODENAME}-$(date +%Y%m%d).zip" . \
            -x ".git*" -x "README.md"

      - name: Upload build log (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload flashable zip
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_NAME }}-ReSukiSU-${{ env.DEVICE_CODENAME }}
          path: "*.zip"
