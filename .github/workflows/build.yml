name: Build Cepheus Kernel with SukiSU & SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 8192
        temp-reserve-mb: 2048
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses-dev libssl-dev xz-utils libelf-dev flex bison gnupg gperf lib32z1-dev lib32ncurses-dev gcc-multilib g++-multilib proxychains-ng libz-dev libtinfo6 ccache libgmp-dev libmpc-dev libmpfr-dev overlayroot liblz4-tool liblzma-dev cpio python3 python3-pip git-lfs

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 -b 15.0 https://github.com/raystef66/kernel_xiaomi_cepheus.git kernel-source

    - name: Setup Toolchain (AOSP Clang & GCC)
      run: |
        # Download AOSP Clang r383902
        mkdir -p clang
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r383902.tar.gz
        tar -C clang/ -xf clang-r383902.tar.gz
        
        # Download GCC AArch64 & ARM32 (LineageOS)
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git gcc64
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git gcc32

    - name: Integrate SukiSU-Ultra (with SUSFS Support)
      run: |
        cd kernel-source
        # Hapus sisa folder KernelSU bawaan jika ada agar bersih
        rm -rf drivers/kernelsu KernelSU
        
        # Menggunakan branch susfs_new yang aktif di repositori SukiSU-Ultra
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s susfs_new

    - name: Inject Defconfig Configurations
      run: |
        cd kernel-source
        DEFCONFIG="arch/arm64/configs/vendor/cepheus_defconfig"
        
        # Hapus konfigurasi KSU/SUSFS lama jika ada agar tidak double
        sed -i '/CONFIG_KSU/d' $DEFCONFIG
        sed -i '/CONFIG_SUSFS/d' $DEFCONFIG
        
        # Tambahkan konfigurasi baru (Menggunakan Manual Hook untuk non-GKI)
        echo "CONFIG_KSU=y" >> $DEFCONFIG
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> $DEFCONFIG
        echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
        echo "CONFIG_SUSFS=y" >> $DEFCONFIG

    - name: Compile Kernel
      run: |
        cd kernel-source
        # Atur PATH ke toolchain AOSP Clang & GCC
        export PATH=$(pwd)/../clang/bin:$(pwd)/../gcc64/bin:$(pwd)/../gcc32/bin:$PATH
        
        export ARCH=arm64
        export SUBARCH=arm64
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_ARM32=arm-linux-androideabi-
        
        make O=out vendor/cepheus_defconfig
        make O=out CC=clang -j$(nproc --all)

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Image.gz-dtb
        path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
