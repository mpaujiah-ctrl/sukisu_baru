name: Build Cepheus Kernel with SukiSU & SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 8192
        temp-reserve-mb: 2048
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses-dev libssl-dev xz-utils libelf-dev flex bison gnupg gperf lib32z1-dev lib32ncurses-dev gcc-multilib g++-multilib proxychains-ng libz-dev libtinfo6 ccache libgmp-dev libmpc-dev libmpfr-dev overlayroot liblz4-tool liblzma-dev cpio python3 python3-pip git-lfs

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 -b 15.0 https://github.com/raystef66/kernel_xiaomi_cepheus.git kernel-source

    - name: Install toolchain (clang + GNU cross-compiler)
      run: |
        sudo apt update
        sudo apt install -y clang lld llvm bc bison flex libssl-dev libelf-dev build-essential
        sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

    - name: Integrate SukiSU-Ultra (with SUSFS Support)
      run: |
        cd kernel-source
        # Hapus sisa folder KernelSU bawaan jika ada agar bersih
        rm -rf drivers/kernelsu KernelSU
        
        # Menggunakan branch susfs_new yang aktif di repositori SukiSU-Ultra
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s susfs_new

    - name: Inject Defconfig Configurations
      run: |
        cd kernel-source
        DEFCONFIG="arch/arm64/configs/cepheus_defconfig"
        
        # Hapus konfigurasi KSU/SUSFS lama jika ada agar tidak double
        sed -i '/CONFIG_KSU/d' $DEFCONFIG
        sed -i '/CONFIG_SUSFS/d' $DEFCONFIG
        
        # Tambahkan konfigurasi baru (Menggunakan Manual Hook untuk non-GKI)
        echo "CONFIG_KSU=y" >> $DEFCONFIG
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> $DEFCONFIG
        echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
        echo "CONFIG_SUSFS=y" >> $DEFCONFIG

    - name: Clone AnyKernel3
      run: git clone --depth=1 https://github.com/osm0sis/AnyKernel3
    
    - name: Compile Kernel
      run: |
        cd kernel
          export ARCH=arm64
          export LLVM=1
          export CC=clang
          export AR=llvm-ar
          export LD=ld.lld
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-gnu-
          export USE_CCACHE=1

          make O=out ARCH=arm64 cepheus_defconfig

          make ARCH=arm64 \
               O=out \
               CC=clang \
               AR=llvm-ar \
               LD=ld.lld \
               NM=llvm-nm \
               OBJCOPY=llvm-objcopy \
               OBJDUMP=llvm-objdump \
               STRIP=llvm-strip \
               -j$(nproc --all) Image.gz-dtb

          echo "=== Verify output ==="
          ls out/arch/arm64/boot/Image.gz-dtb
          ls out/arch/arm64/boot/Image

    - name: Pack AnyKernel3
      run: |
        cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
        cp kernel/out/arch/arm64/boot/Image kernel-pure.img
        cd AnyKernel3 && zip -r9 ../TURTLE.zip * -x README

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TURTLE
        path: |
          TURTLE.zip
          kernel/out/arch/arm64/boot/Image.gz-dtb
          kernel-pure.img
