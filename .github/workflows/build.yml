name: Build Cepheus Kernel with SukiSU & SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 8192
        temp-reserve-mb: 2048
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev xz-utils libelf-dev flex bison gnupg gperf lib32z1-dev lib32ncurses5-dev gcc-multilib g++-multilib proxychains-ng libz-dev libtinfo5 ccache libgmp-dev libmpc-dev libmpfr-dev overlayroot liblz4-tool liblzma-dev cpio python3 python3-pip git-lfs

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 -b 15.0 https://github.com/raystef66/kernel_xiaomi_cepheus.git kernel-source

    - name: Setup Toolchain (Proton Clang)
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git tc

    - name: Integrate SukiSU-Ultra
      run: |
        cd kernel-source
        # Mengunduh source code SukiSU / KernelSU-Next / ReSukiSU ke folder Drivers
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main

    - name: Apply SUSFS Patches
      run: |
        cd kernel-source
        # Clone repo susfs4ksu khusus branch kernel 4.14
        git clone --depth=1 -b kernel-4.14 https://gitlab.com/simonpunk/susfs4ksu.git susfs
        
        # Salin file header dan patch susfs ke kernel tree
        cp susfs/kernel_patches/fs/* fs/
        cp susfs/kernel_patches/include/linux/* include/linux/
        
        # Jalankan patch kernel
        patch -p1 < susfs/kernel_patches/50_add_susfs_in_kernel-4.14.patch || echo "Patch kernel SUSFS gagal atau butuh manual conflict resolution"
        
        # Jalankan patch untuk SukiSU/KernelSU
        cd KernelSU
        patch -p1 < ../susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch || echo "Patch SukiSU SUSFS gagal"
        cd ..

    - name: Inject Defconfig Configurations
      run: |
        cd kernel-source
        # Menambahkan konfigurasi SukiSU dan SUSFS ke defconfig perangkat (ganti cepheus_defconfig jika namanya berbeda)
        DEFCONFIG="arch/arm64/configs/vendor/cepheus_defconfig"
        echo "CONFIG_KSU=y" >> $DEFCONFIG
        echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
        echo "CONFIG_SUSFS=y" >> $DEFCONFIG

    - name: Compile Kernel
      run: |
        cd kernel-source
        export PATH=$(pwd)/../tc/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        
        make O=out vendor/cepheus_defconfig
        make O=out CC=clang -j$(nproc --all)

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Image.gz-dtb
        path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
